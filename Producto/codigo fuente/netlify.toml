[build]
  command = "npm run build"
  publish = "dist"

# SPA routing — todas las rutas sirven index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# index.html nunca se cachea — evita el error de "chunk no encontrado" tras un deploy
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Assets con hash en el nombre → caché permanente (son inmutables por diseño de Vite)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
